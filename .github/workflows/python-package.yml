# Legacy "Building" workflow, modernized.
#
# Responsibility: package build + install smoke ONLY. Behavioral tests live in
# .github/workflows/ci.yml (added by P00). The two workflows are intentionally
# kept separate and must not be merged.
#
# Python support policy is decided separately (planned: P01). This workflow
# does NOT change the declared minimum Python version in setup.py -- it only
# picks a single runner interpreter (3.11) to exercise the build/install path.

name: Building

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Include the workflow name and the ref so different workflows / branches /
  # PRs never cancel each other's runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Pinned to the commit SHA of the actions/checkout v4 tag for
      # supply-chain integrity. actions/checkout@v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      # actions/setup-python@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build wheel and install
        run: |
          python -m pip install --upgrade pip build
          python -m build
          # Install the freshly built wheel (not -e .) to prove the built
          # distribution is importable in a clean environment.
          python -m pip install dist/*.whl

      - name: Import smoke from installed wheel
        shell: bash
        run: |
          # Run from a directory OUTSIDE the checked-out source tree. Otherwise
          # Python puts the repo root on sys.path[0] and `import douzero` would
          # resolve to ./douzero instead of the freshly installed wheel, making
          # the smoke test meaningless.
          #
          # We import douzero, douzero.env, douzero.evaluation only. We
          # deliberately do NOT import douzero.dmc: douzero/dmc/file_writer.py
          # does `import git` (GitPython) at module load, but setup.py's
          # install_requires lists only ['torch','rlcard'] -- GitPython is in
          # requirements.txt but NOT install_requires, so a plain
          # `pip install dist/*.whl` does not pull it. That metadata gap is a
          # pre-existing issue on main and is out of scope for this CI
          # modernization (dependency/Python policy is planned for P01).
          cd "$RUNNER_TEMP"

          python - <<'PY'
          import os
          from pathlib import Path

          import douzero
          import douzero.env
          import douzero.evaluation

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          package_path = Path(douzero.__file__).resolve()

          assert workspace not in package_path.parents, (
              f"Imported source tree instead of installed wheel: {package_path}"
          )

          print("douzero import OK:", package_path)
          print("douzero.env import OK")
          print("douzero.evaluation import OK")
          PY

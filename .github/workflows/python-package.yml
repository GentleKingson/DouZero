# Legacy "Building" workflow, modernized.
#
# Responsibility: package build + install smoke ONLY. Behavioral tests live in
# .github/workflows/ci.yml. The two workflows are intentionally kept separate
# and must not be merged.
#
# P01: supported Python is now 3.11+ (pyproject.toml requires-python); this
# workflow tests the build/install/import path across 3.11/3.12/3.13.

name: Building

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Include the workflow name and the ref so different workflows / branches /
  # PRs never cancel each other's runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # P01: supported Python is 3.11+ (see pyproject.toml requires-python).
        python-version: ["3.11", "3.12", "3.13"]

    env:
      # Inject the commit SHA into version metadata for parity with ci.yml
      # (douzero/_version.py reads this when .git is absent).
      DOUZERO_GIT_SHA: ${{ github.sha }}

    steps:
      # Pinned to the v6 tag's commit SHA for supply-chain integrity.
      # actions/checkout@v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      # actions/setup-python@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Build wheel and install
        run: |
          python -m pip install --upgrade pip build
          python -m build
          # Install the freshly built wheel (not -e .) to prove the built
          # distribution is importable in a clean environment.
          python -m pip install dist/*.whl

      - name: Import smoke from installed wheel
        shell: bash
        run: |
          # Run from a directory OUTSIDE the checked-out source tree. Otherwise
          # Python puts the repo root on sys.path[0] and `import douzero` would
          # resolve to ./douzero instead of the freshly installed wheel, making
          # the smoke test meaningless.
          #
          # All four top-level packages are imported. douzero.dmc is safe to
          # import from a plain wheel install: GitPython is declared in
          # install_requires, and file_writer.py imports it lazily inside
          # gather_metadata (so module load no longer requires GitPython).
          cd "$RUNNER_TEMP"

          python - <<'PY'
          import os
          from pathlib import Path

          import douzero
          import douzero.config
          import douzero.checkpoint
          import douzero.dmc
          import douzero.env
          import douzero.evaluation

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          package_path = Path(douzero.__file__).resolve()

          assert workspace not in package_path.parents, (
              f"Imported source tree instead of installed wheel: {package_path}"
          )

          print("douzero import OK:", package_path)
          print("douzero.config import OK")
          print("douzero.checkpoint import OK")
          print("douzero.dmc import OK")
          print("douzero.env import OK")
          print("douzero.evaluation import OK")
          PY

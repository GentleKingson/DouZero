# PR #26 C0 baseline: one synchronous game per actor.
xpid: legacy-c0-sync-baseline
actor_device_cpu: true
training_device: "0"
num_actor_devices: 1
num_actors: 12
num_threads: 1
batch_size: 32
unroll_length: 100
num_buffers: 64
sync_interval_updates: 16
policy_snapshot_slots: 3
amp_enabled: false
pin_memory: true
disable_checkpoint: true
legacy_actor_backend: centralized_factorized
actor_torch_threads: 1
legacy_contiguous_buffers: true
legacy_bulk_rollout: true
legacy_flush_ge: true
legacy_reusable_pinned_staging: true
legacy_log_interval_seconds: 5.0
legacy_profile: true
legacy_profile_sample_interval: 10
central_actor_max_actions: 4096
central_actor_envs_per_actor: 1
central_actor_min_microbatch: 1
central_actor_target_microbatch: 4
central_actor_max_microbatch: 4
central_actor_max_delay_ms: 2.0
central_actor_max_pending_requests: 128
central_actor_queue_high_watermark: 32
central_actor_inference_deadline_ms: 10.0
central_actor_learner_throttle: false

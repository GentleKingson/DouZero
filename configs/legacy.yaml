# Legacy DouZero configuration (P01).
#
# This file is the YAML form of the EXACT defaults declared in
# douzero/dmc/arguments.py. It exists so that `--config configs/legacy.yaml`
# reproduces the original training configuration field-for-field. Any edit here
# is a behavior change and must be intentional.
#
# Loaded via douzero.config.load_config(). CLI flags override these values when
# both are present.

# General
xpid: douzero
save_interval: 30
checkpoint_sidecar_retention: 2
objective: adp

# Training settings
actor_device_cpu: false
gpu_devices: "0"
num_actor_devices: 1
num_actors: 5
training_device: "0"
load_model: false
disable_checkpoint: false
savedir: douzero_checkpoints

# Hyperparameters
total_frames: 100000000000
exp_epsilon: 0.01
batch_size: 32
unroll_length: 100
num_buffers: 50
num_threads: 4
max_grad_norm: 40.0

# P14 system controls. Optional accelerators are disabled by default.
sync_interval_updates: 1
policy_snapshot_slots: 2
amp_enabled: false
amp_dtype: float16
amp_fallback_on_nonfinite: true
pin_memory: false
ddp_enabled: false
ddp_backend: auto
compile_model: false
legacy_actor_backend: legacy
actor_torch_threads: 0
legacy_contiguous_buffers: false
legacy_bulk_rollout: false
legacy_flush_ge: false
legacy_reusable_pinned_staging: false
legacy_log_interval_seconds: 0.0
legacy_monitor_interval_seconds: 5.0
legacy_profile: false
legacy_profile_sample_interval: 10
legacy_metrics_path: ""
benchmark_warmup_frames: 0
compile_actor: false
compile_learner: false
rmsprop_foreach: false
grad_clip_foreach: false
central_actor_max_actions: 512
central_actor_microbatch: 4
central_actor_envs_per_actor: 4
central_actor_min_microbatch: 2
central_actor_target_microbatch: 8
central_actor_max_microbatch: 16
central_actor_max_delay_ms: 2.0
central_actor_max_pending_requests: 128
central_actor_queue_high_watermark: 32
central_actor_inference_deadline_ms: 10.0
central_actor_learner_throttle: false
central_actor_learner_throttle_mode: fixed_threshold
central_actor_predicted_drain_target_ms: 10.0
central_actor_use_stream_priority: true
central_actor_async_policy_copy: true
central_actor_runtime: thread
central_actor_split_dense1: false
central_actor_staging_dtype: float32
central_actor_timeout_seconds: 30.0

# P01-added knobs (defaults preserve legacy behavior)
seed: 0
deterministic: false
# Version identifiers (P01 only supports "legacy"; later phases widen these).
feature_version: legacy
ruleset: legacy
model_version: legacy

# Optimizer (RMSProp)
optimizer:
  learning_rate: 0.0001
  alpha: 0.99
  momentum: 0
  epsilon: 1.0e-5

# P06 multi-objective loss + decision policy. All weights are 0 here so the
# legacy single-target MSE training path (douzero.dmc.compute_loss) is
# unchanged. The V2 trainer (train_v2.py) reads these and builds a
# multi-objective LossConfig; enabling any lambda > 0 in this file does NOT
# affect the legacy train.py entry point.
loss:
  lambda_win: 0.0
  lambda_score: 0.0
  lambda_uncertainty: 0.0
  score_delta: 1.0
  score_target_transform: raw
  score_clamp: 32.0

decision_policy:
  mode: pure_win
  abs_tol: 0.0
  rel_tol: 0.0
  risk_penalty: 0.0

# Enhanced DouZero configuration (P06).
#
# This is the V2 multi-objective training configuration: shared state/action
# model with multi-head outputs (win probability + conditional scores),
# team-perspective labels, BCE + Huber multi-objective loss, and the
# configurable decision policy. Loaded via the V2 trainer entry point
# (train_v2.py --config configs/enhanced.yaml).
#
# The legacy train.py path does NOT read this file. Enabling any of these
# knobs through the legacy entry point has no effect (the legacy loop uses
# the single-target MSE in douzero.dmc.compute_loss regardless).
#
# IMPORTANT (P06 r3): only the fields marked "consumed" below are actually
# read by the P06 single-process V2 trainer (train_v2.py). The legacy
# multiprocessing fields (actor_device_cpu, gpu_devices, num_actors, etc.)
# are carried because this file is loaded as a TrainingConfig, but they are
# NOT consumed by the V2 trainer and setting them to non-default values
# produces a visible warning at startup. P14's high-throughput trainer will
# consume them.

# General (consumed: objective for the identity gate)
xpid: douzero_v2          # (ignored by train_v2.py; legacy multiprocess only)
save_interval: 30         # (ignored by train_v2.py; legacy checkpoint only)
objective: adp            # consumed: identity gate requires 'adp'

# --- Legacy multiprocess settings (NOT consumed by train_v2.py) --- #
# These are carried for TrainingConfig schema compatibility. Setting any to
# a non-default value triggers a startup warning in train_v2.py. They will
# be consumed when P14 wires the multiprocessing actor/learner.
actor_device_cpu: false   # (ignored; train_v2.py is CPU-only)
gpu_devices: "0"          # (ignored; train_v2.py forces CUDA_VISIBLE_DEVICES="")
num_actor_devices: 1      # (ignored; single-process trainer)
num_actors: 5             # (ignored; single-process trainer)
training_device: "0"      # (ignored; CPU-only)
load_model: false         # (ignored; no checkpoint resume in P06)
disable_checkpoint: false # (ignored; no checkpoint save in P06)
savedir: douzero_v2_checkpoints  # (ignored; no checkpoint save in P06)

# --- Hyperparameters --- #
# Consumed: exp_epsilon, batch_size, max_grad_norm.
# Ignored: total_frames, unroll_length, num_buffers, num_threads.
total_frames: 600000      # (ignored; train_v2.py uses --episodes / max_episodes)
exp_epsilon: 0.05         # consumed: exploration epsilon
batch_size: 32            # consumed: minibatch size
unroll_length: 100        # (ignored; legacy multiprocess buffer only)
num_buffers: 50           # (ignored; legacy multiprocess buffer only)
num_threads: 4            # (ignored; legacy multiprocess learner only)
max_grad_norm: 40.0       # consumed: gradient clip

# P14 training-system controls. AMP/DDP/compile remain opt-in so loading this
# config on CPU is portable. Use torchrun for DDP.
sync_interval_updates: 8
policy_snapshot_slots: 2
amp_enabled: false
amp_dtype: float16
amp_fallback_on_nonfinite: true
pin_memory: false
ddp_enabled: false
ddp_backend: auto
compile_model: false

# Reproducibility (consumed: seed=0 means no-op per the project convention)
seed: 0
deterministic: false

# Version identifiers (consumed: identity gate requires these exact values)
feature_version: v2
ruleset: legacy
model_version: v2

# Optimizer (RMSProp) — consumed by the V2 trainer's optimizer
optimizer:
  learning_rate: 0.0001
  alpha: 0.99
  momentum: 0
  epsilon: 1.0e-5

# V2 model architecture (P06 r5). Consumed by train_v2.py via
# ModelV2Config.from_model_config(). The score_clamp and
# score_target_transform are overlaid from the loss: block below because
# they are training-identity fields, not pure architecture.
model:
  version: v2
  hidden_size: 256
  history_encoder: transformer
  history_layers: 4
  history_heads: 8
  role_embedding_dim: 32
  belief_enabled: false
  human_prior_enabled: false
  # P11 public action-style conditioning. Disabled is exactly the P10 model.
  style_enabled: false
  style_embedding_dim: 64
  # P09 strategy features/heads are opt-in. Feature-group toggles are kept in
  # checkpoint identity for reproducible ablations. The bounded DP falls back
  # deterministically when strategy_node_budget is exhausted.
  strategy_features_enabled: false
  strategy_hand_enabled: true
  strategy_structure_enabled: true
  strategy_control_enabled: true
  strategy_cooperation_enabled: true
  strategy_risk_enabled: true
  strategy_aux_enabled: false
  strategy_node_budget: 500
  strategy_time_budget_ms: 0

# P06 multi-objective loss. These are the V2 trainer defaults: BCE win head
# (weight 1.0) + masked Huber conditional score heads (weight 0.5). The
# uncertainty-NLL term is available for ablation but defaults OFF.
#
# score_target_transform selects which target the conditional heads are
# supervised against (mutually exclusive — a single head cannot fit both
# scales at once):
#   raw        — fit the raw team score (clamped to score_clamp).
#   signed_log — fit sign(s)·log1p(|s|) (compresses the bomb/rocket tail).
loss:
  lambda_win: 1.0
  lambda_score: 0.5
  lambda_uncertainty: 0.0
  # P09 auxiliary objectives. Each is independently ablatable and all default
  # off; non-zero values require model.strategy_aux_enabled: true.
  lambda_min_turns: 0.0
  lambda_regain_initiative: 0.0
  lambda_teammate_finish: 0.0
  lambda_spring: 0.0
  lambda_structure: 0.0
  score_delta: 1.0
  score_target_transform: raw
  score_clamp: 32.0

# Decision policy. `pure_win` is the deployment default (matches the P05
# DeepAgentV2). Switch to `win_then_score` / `score_then_win` for
# lexicographic selection, or `risk_aware` (default off via risk_penalty 0)
# for the uncertainty-penalized mode. `pure_prior` selects the highest
# human-play prior logit and requires a model built with
# human_prior_enabled=true (P08 ablation).
decision_policy:
  mode: pure_win
  abs_tol: 0.0
  rel_tol: 0.0
  risk_penalty: 0.0
  # Used only by mode: uncertainty_gated_prior. alpha=0 is exactly pure_score.
  prior_alpha: 0.0

# P08 human-data behaviour-cloning prior. The BC auxiliary loss is enabled iff
# loss.lambda_bc > 0 (single source of truth — there is no separate bc.enabled
# or bc.lambda_bc). Enable by setting model.human_prior_enabled: true,
# loss.lambda_bc: <weight>, and pointing bc.data_path at a validated human-game
# JSONL (produced by ingest_human_games.py + validate_human_games.py).
#
# schedule selects how loss.lambda_bc evolves over RL training:
#   constant     — fixed weight (default).
#   linear_decay — decays to schedule_floor over schedule_steps,
#                  never forced below the floor so a residual prior survives.
bc:
  data_path: ""             # validated canonical JSONL of human games
  temperature: 1.0          # BC softmax temperature (RL+BC + pretrain paths)
  label_smoothing: 0.0      # mask-aware smoothing over the legal-action list
  skill_weight_clip: 10.0
  schedule: constant
  schedule_steps: 0
  schedule_floor: 0.0

# P10 privileged-teacher/public-student distillation. Disabled by default so
# the P06-P09 trainer and every deployment path remain unchanged. Enable only
# in the dedicated ``python -m douzero.distillation.train_teacher`` and
# ``python -m douzero.distillation.distill_student`` workflows.
distillation:
  enabled: false
  teacher_checkpoint: ""
  dataset_path: ""
  cache_path: ""
  batch_size: 32
  distillation_temperature: 2.0
  top_k: 4
  lambda_kl: 1.0
  lambda_rank: 0.25
  lambda_teacher_win: 0.5
  lambda_teacher_score: 0.25
  lambda_supervised_win: 1.0
  lambda_supervised_score: 0.5

# P11 policy population. `single` assigns the current policy to every seat;
# `population` rotates learner-controlled seats and samples opponents once at
# each game boundary. Only learner-controlled decisions enter replay.
league:
  enabled: false
  mode: single
  manifest_path: ""
  snapshot_root: ""
  match_log_path: ""
  seed: 0
  learner_seats_per_game: 1
  include_random_agent: true
  include_rule_agent: false
  snapshot_interval_steps: 0
  keep_recent: 5
  milestone_interval: 0
  keep_top_rated: 3
  promotion_min_pairs: 1000
  promotion_min_ci_lower_bound: 0.0

# P12 coach-guided opening curriculum. Disabled by default, so existing V2
# self-play remains true random. Guided modes require a separately trained
# coach checkpoint; labels and sampling audits are separate JSONL streams.
curriculum:
  enabled: false
  mode: mixture
  coach_checkpoint: ""
  labels_path: ""
  audit_log_path: ""
  policy_version: current
  policy_step: 0
  # Reject future coach checkpoints and checkpoints older than this many
  # optimizer updates. Label freshness below is a separate refit-data window.
  max_coach_age_steps: 100000
  max_label_age_steps: 100000
  seed: 0
  candidate_pool_size: 16
  hard_role: landlord
  early_until: 0.30
  mid_until: 0.70
  min_true_random_ratio: 0.20
  early_true_random: 0.20
  early_balanced: 0.70
  early_hard_for_role: 0.10
  middle_true_random: 0.50
  middle_balanced: 0.30
  middle_hard_for_role: 0.20
  late_true_random: 0.90
  late_balanced: 0.05
  late_hard_for_role: 0.05

# P13 optional inference search. It consumes only PublicObservation V2 plus
# hidden-hand samples drawn by the P07 constrained DP. Disabled is exactly the
# P12 base policy; zero budgets also force the base-action fallback.
search:
  enabled: false
  top_k: 3
  belief_samples: 8
  rollout_depth: 12
  endgame_cards_threshold: 12
  max_nodes: 20000
  max_rollouts: 64
  max_milliseconds: 100
  risk_penalty: 0.0
  selection_mode: win_then_score
  seed: 0
